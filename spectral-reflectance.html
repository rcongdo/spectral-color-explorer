<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spectral Reflectance Explorer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

#too-narrow {
  display: none; position: fixed; inset: 0;
  background: #0f172a; align-items: center; justify-content: center;
  text-align: center; padding: 2rem; color: #64748b; font-size: 1rem; line-height: 1.6;
}
@media (max-width: 899px) {
  #too-narrow { display: flex; }
  #app { display: none; }
}

#app { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
h1 { font-size: 1.2rem; font-weight: 600; color: #94a3b8; letter-spacing: 0.05em;
     text-transform: uppercase; margin-bottom: 1.25rem; }

#controls { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1rem; }
.control-label { font-size: 0.75rem; color: #475569; text-transform: uppercase; letter-spacing: 0.05em; }

.illuminant-chip {
  padding: 4px 14px; border-radius: 999px; font-size: 0.78rem; cursor: pointer;
  border: 1px solid #1e293b; background: #1e293b; color: #64748b;
  transition: all 0.15s; font-weight: 500;
}
.illuminant-chip.active { color: #0f172a; border-color: transparent; font-weight: 600; }
.illuminant-chip:disabled { opacity: 0.35; cursor: not-allowed; }

select, button {
  background: #1e293b; color: #94a3b8; border: 1px solid #334155;
  border-radius: 6px; padding: 4px 10px; font-size: 0.78rem; cursor: pointer;
}
select:focus, button:focus { outline: 1px solid #475569; }
button:hover { color: #e2e8f0; }

#graph-wrap { background: #0a1628; border-radius: 10px; padding: 1rem 1rem 0.5rem; margin-bottom: 1rem; }
#spectral-graph { display: block; width: 100%; }
#graph-legend { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 0.5rem; padding-bottom: 0.5rem; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.7rem; color: #475569; }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; }

#output-panel { display: flex; gap: 1rem; flex-wrap: wrap; }
.color-card {
  background: #0a1628; border-radius: 10px; padding: 1rem; flex: 1; min-width: 190px;
}
.color-swatch {
  width: 100%; height: 80px; border-radius: 6px; margin-bottom: 0.5rem;
  position: relative; background: #1e293b;
}
.gamut-badge {
  display: none; position: absolute; top: 6px; right: 6px;
  background: rgba(0,0,0,0.65); color: #fbbf24;
  font-size: 0.6rem; padding: 2px 6px; border-radius: 3px; letter-spacing: 0.03em;
}
.approx-label { font-size: 0.6rem; color: #334155; text-align: right; margin-bottom: 0.5rem; }
.card-illuminant { font-size: 0.8rem; font-weight: 600; margin-bottom: 0.5rem; }
.value-row { font-size: 0.73rem; color: #475569; line-height: 2; display: flex; justify-content: space-between; }
.value-row span { color: #94a3b8; font-family: monospace; }
.metameric-badge {
  display: none; margin-top: 0.6rem;
  font-size: 0.65rem; padding: 3px 8px; border-radius: 4px;
  background: #4c1d9533; color: #a78bfa; border: 1px solid #4c1d9566;
}

.cp-handle { cursor: ns-resize; }
.cp-handle circle { transition: r 0.1s; }
.cp-handle:hover circle, .cp-handle.selected circle { r: 7 !important; }
.cp-tooltip {
  pointer-events: none; font-size: 11px; fill: #e2e8f0;
  font-family: monospace; text-anchor: middle;
}
</style>
</head>
<body>
<div id="too-narrow">
  <p>Spectral Reflectance Explorer<br><br>
  Best viewed on a desktop or laptop (900px+ wide).</p>
</div>
<div id="app">
  <h1>Spectral Reflectance Explorer</h1>
  <div id="controls">
    <span class="control-label">Illuminant</span>
    <div id="illuminant-chips"></div>
    <select id="preset-select">
      <option value="">— Preset —</option>
      <option value="flat-white">Flat White</option>
      <option value="neutral-gray">Neutral Gray</option>
      <option value="cyan">Process Cyan</option>
      <option value="magenta">Process Magenta</option>
      <option value="yellow">Process Yellow</option>
      <option value="black">Black</option>
      <option value="red">Red</option>
      <option value="green">Green</option>
      <option value="blue">Blue</option>
    </select>
    <button id="reset-btn">Reset</button>
    <label style="display:flex;align-items:center;gap:6px;font-size:0.75rem;color:#475569;cursor:pointer;">
      <input type="checkbox" id="snap-toggle" checked style="accent-color:#3b82f6;">
      1% snap
    </label>
  </div>
  <div id="graph-wrap">
    <svg id="spectral-graph" viewBox="0 0 820 340"></svg>
    <div id="graph-legend"></div>
  </div>
  <div id="output-panel"></div>
</div>
<script>
'use strict';

</script>
</body>
</html>
